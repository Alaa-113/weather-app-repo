<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white text-center">
        <h3>🌤️ Create Account</h3>
      </div>
      <div class="card-body">
        @if (error) {
          <div class="alert alert-danger">{{ error }}</div>
        }

        @if (loading) {
          <div class="text-center">
            <div class="spinner-border text-success"></div>
          </div>
        }

        <form (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" [(ngModel)]="username" name="username" autocomplete="username">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" autocomplete="new-password">
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input type="password" class="form-control" [(ngModel)]="passwordConfirm" name="passwordConfirm" autocomplete="new-password">
          </div>

          <button type="submit" class="btn btn-success w-100" [disabled]="loading">
            Register
          </button>
        </form>

        <p class="text-center mt-3 mb-0">
          Already have an account? <a routerLink="/login">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
